apiVersion: v1
kind: ConfigMap
metadata:
  name: arogya-config
  namespace: {{ .Values.namespace }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  CORS_ORIGIN: {{ .Values.config.corsOrigin | quote }}
  AUTH_SERVICE_URL: "http://auth-service:3001"
  PATIENT_SERVICE_URL: "http://patient-service:3002"
  DOCTOR_SERVICE_URL: "http://doctor-service:3003"
  APPOINTMENT_SERVICE_URL: "http://appointment-service:3004"
  TELEMEDICINE_SERVICE_URL: "http://telemedicine-service:3005"
  PAYMENT_SERVICE_URL: "http://payment-service:3006"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3007"
  AI_SERVICE_URL: "http://ai-symptom-service:3008"
  ML_SERVICE_URL: "http://ai-ml-service:5000"
  KAFKA_BROKER: {{ .Values.config.kafkaBroker | quote }}
  JITSI_BASE_URL: {{ .Values.config.jitsiBaseUrl | quote }}
  UPLOAD_BASE: {{ .Values.config.uploadBase | quote }}
  PATIENT_UPLOAD_DIR: {{ .Values.config.patientUploadDir | quote }}
  DOCTOR_UPLOAD_DIR: {{ .Values.config.doctorUploadDir | quote }}
  ENABLE_SMS: "true"
