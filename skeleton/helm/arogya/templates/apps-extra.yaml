apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: ai-symptom-service
  ports:
    - port: 3008
      targetPort: 3008
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      initContainers:
        - name: wait-for-ai-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres-ai 5432; do sleep 2; done"]
        - name: wait-for-ai-ml-service
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z ai-ml-service 5000; do sleep 2; done"]
      containers:
        - name: ai-symptom-service
          image: "{{ .Values.images.aiSymptomService.repository }}:{{ .Values.images.aiSymptomService.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 3008
          env:
            - name: PORT
              value: "3008"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: arogya-config
                  key: NODE_ENV
            - name: DB_HOST
              value: postgres-ai
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: ai_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: ML_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: arogya-config
                  key: ML_SERVICE_URL
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: gemini-api-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
---
apiVersion: v1
kind: Service
metadata:
  name: ai-ml-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: ai-ml-service
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ml-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ml-service
  template:
    metadata:
      labels:
        app: ai-ml-service
    spec:
      containers:
        - name: ai-ml-service
          image: "{{ .Values.images.aiMlService.repository }}:{{ .Values.images.aiMlService.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 5000
          env:
            - name: PYTHON_SERVICE_PORT
              value: "5000"
