namespace: healthcare
createNamespace: true

imagePullPolicy: IfNotPresent

config:
  nodeEnv: development
  corsOrigin: http://localhost,http://127.0.0.1,http://arogya.local
  jitsiBaseUrl: https://meet.jit.si
  kafkaBroker: kafka:9092
  uploadBase: /app/uploads
  patientUploadDir: /app/uploads/medical-records
  doctorUploadDir: /uploads/doctor-verification

secrets:
  db:
    username: admin
    password: password
  app:
    jwtSecret: SyOudFfvRbmoURg4Mq2N34wq
    refreshTokenSecret: SyOudFfvRbmoURg4Mq2N34wq_refresh
    internalServiceKey: healthcare-internal-dev
    smsApiToken: replace-with-your-smsapi-token
    smsSenderId: Arogya Healthcare System
    stripeSecretKey: replace-with-your-stripe-secret-key
    stripeWebhookSecret: whsec_from_stripe_dashboard_or_cli
    geminiApiKey: replace-with-your-gemini-api-key

images:
  frontend:
    repository: arogya/frontend
    tag: local
  gateway:
    repository: arogya/gateway
    tag: local
  authService:
    repository: arogya/auth-service
    tag: local
  patientService:
    repository: arogya/patient-service
    tag: local
  doctorService:
    repository: arogya/doctor-service
    tag: local
  appointmentService:
    repository: arogya/appointment-service
    tag: local
  telemedicineService:
    repository: arogya/telemedicine-service
    tag: local
  paymentService:
    repository: arogya/payment-service
    tag: local
  notificationService:
    repository: arogya/notification-service
    tag: local
  aiSymptomService:
    repository: arogya/ai-symptom-service
    tag: local
  aiMlService:
    repository: arogya/ai-ml-service
    tag: local

databases:
  - name: auth
    serviceName: postgres-auth
    dbName: auth_db
    storage: 2Gi
  - name: patient
    serviceName: postgres-patient
    dbName: patient_db
    storage: 5Gi
  - name: doctor
    serviceName: postgres-doctor
    dbName: doctor_db
    storage: 2Gi
  - name: appointment
    serviceName: postgres-appointment
    dbName: appointment_db
    storage: 2Gi
  - name: telemedicine
    serviceName: postgres-telemedicine
    dbName: telemedicine_db
    storage: 2Gi
  - name: payment
    serviceName: postgres-payment
    dbName: payment_db
    storage: 2Gi
  - name: notification
    serviceName: postgres-notification
    dbName: notification_db
    storage: 2Gi
  - name: ai
    serviceName: postgres-ai
    dbName: ai_db
    storage: 2Gi

storage:
  patientUploads: 5Gi
  doctorUploads: 2Gi

ingress:
  enabled: true
  className: nginx
  host: arogya.local
