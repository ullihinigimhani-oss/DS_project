apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: payment-service
  ports:
    - port: 3006
      targetPort: 3006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
        - name: wait-for-payment-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres-payment 5432; do sleep 2; done"]
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do sleep 2; done"]
      containers:
        - name: payment-service
          image: "{{ .Values.images.paymentService.repository }}:{{ .Values.images.paymentService.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: "3006"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: arogya-config
                  key: NODE_ENV
            - name: DB_HOST
              value: postgres-payment
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: payment_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: arogya-config
                  key: KAFKA_BROKER
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: stripe-webhook-secret
---
